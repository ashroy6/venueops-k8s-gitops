apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.web.name }}
  namespace: {{ include "venueops.namespace" . }}
  labels:
    app: {{ .Values.web.name }}
    {{- include "venueops.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.web.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.web.rollingUpdate.maxUnavailable }}
  selector:
    matchLabels:
      app: {{ .Values.web.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.web.name }}
    spec:
      nodeSelector:
        {{- toYaml .Values.web.nodeSelector | nindent 8 }}
      {{- if .Values.web.antiAffinity }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: {{ .Values.web.name }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.web.port }}
              name: http
          readinessProbe:
            httpGet:
              path: /health.html
              port: {{ .Values.web.port }}
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health.html
              port: {{ .Values.web.port }}
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.web.name }}
  namespace: {{ include "venueops.namespace" . }}
  labels:
    app: {{ .Values.web.name }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.web.name }}
  ports:
    - name: http
      port: {{ .Values.web.port }}
      targetPort: {{ .Values.web.port }}
