apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: venueops-default-deny-ingress
  namespace: venueops
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-nginx-to-venueops-web
  namespace: venueops
spec:
  podSelector:
    matchLabels:
      app: venueops-web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-venueops-web-to-api
  namespace: venueops
spec:
  podSelector:
    matchLabels:
      app: venueops-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: venueops-web
      ports:
        - protocol: TCP
          port: 8000

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-venueops-web-to-ingestion-api
  namespace: venueops
spec:
  podSelector:
    matchLabels:
      app: venueops-ingestion-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: venueops-web
      ports:
        - protocol: TCP
          port: 8001
