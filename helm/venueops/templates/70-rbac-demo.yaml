{{- if .Values.rbacDemo.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbacDemo.serviceAccountName }}
  namespace: {{ include "venueops.namespace" . }}
  labels:
    {{- include "venueops.labels" . | nindent 4 }}
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.rbacDemo.roleName }}
  namespace: {{ include "venueops.namespace" . }}
  labels:
    {{- include "venueops.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - configmaps
      - events
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.rbacDemo.roleBindingName }}
  namespace: {{ include "venueops.namespace" . }}
  labels:
    {{- include "venueops.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbacDemo.serviceAccountName }}
    namespace: {{ include "venueops.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.rbacDemo.roleName }}
{{- end }}
