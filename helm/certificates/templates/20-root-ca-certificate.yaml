apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.rootCA.name }}
  namespace: {{ .Values.rootCA.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  isCA: true
  commonName: {{ .Values.rootCA.commonName | quote }}
  secretName: {{ .Values.rootCA.secretName | quote }}
  duration: {{ .Values.rootCA.duration | quote }}
  renewBefore: {{ .Values.rootCA.renewBefore | quote }}

  subject:
    organizations:
      - {{ .Values.rootCA.organization | quote }}

  privateKey:
    algorithm: {{ .Values.rootCA.privateKey.algorithm | quote }}
    size: {{ .Values.rootCA.privateKey.size }}

  usages:
    - cert sign
    - crl sign

  issuerRef:
    name: {{ .Values.clusterIssuers.selfSigned.name }}
    kind: ClusterIssuer
    group: cert-manager.io