clusterIssuers:
  selfSigned:
    name: kl-selfsigned-bootstrap

  ca:
    name: kl-internal-ca

rootCA:
  name: kl-root-ca
  namespace: cert-manager
  secretName: kl-root-ca-secret
  commonName: KL Internal Root CA
  organization: KL Platform
  duration: 87600h
  renewBefore: 720h
  privateKey:
    algorithm: RSA
    size: 4096

certificates:
  venueops:
    enabled: true
    name: venueops-tls
    namespace: venueops
    secretName: venueops-tls
    commonName: venueops.local
    dnsNames:
      - venueops.local
      - api.venueops.local
      - ingestion.venueops.local
    duration: 2160h
    renewBefore: 360h
    privateKey:
      algorithm: RSA
      size: 2048