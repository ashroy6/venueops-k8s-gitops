{{- if .Values.nodeExporter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: {{ include "monitoring.namespace" . }}
  labels:
    app: node-exporter
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: node-exporter
  ports:
    - name: metrics
      protocol: TCP
      port: {{ .Values.nodeExporter.port }}
      targetPort: metrics
{{- end }}