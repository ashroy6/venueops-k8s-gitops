apiVersion: v1
kind: PersistentVolume
metadata:
  name: venueops-hostpath-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: venueops-hostpath
  hostPath:
    path: /opt/venueops/data
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: venueops-data-pvc
  namespace: venueops
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: venueops-hostpath
  resources:
    requests:
      storage: 2Gi
