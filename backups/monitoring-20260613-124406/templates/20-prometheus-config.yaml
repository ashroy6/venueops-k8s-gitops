{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ include "monitoring.namespace" . }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alert-rules.yml

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "node-exporter"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: monitoring

          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: node-exporter

          - source_labels: [__meta_kubernetes_pod_ip]
            action: replace
            target_label: __address__
            replacement: "$1:9100"

          - source_labels: [__meta_kubernetes_pod_node_name]
            action: replace
            target_label: node

          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod

      - job_name: "kube-state-metrics"
        static_configs:
          - targets:
              - "kube-state-metrics.monitoring.svc.cluster.local:8080"

      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"

          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: "(.+)"

          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: '([^:]+)(?::\d+)?;(\d+)'
            replacement: '$1:$2'
            target_label: __address__

          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)

          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace

          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

  alert-rules.yml: |
    groups:
      - name: kubernetes-basic-health
        rules:
          - alert: KubernetesPodRestartingTooMuch
            expr: increase(kube_pod_container_status_restarts_total[10m]) > 3
            for: 2m
            labels:
              severity: warning
              category: kubernetes
            annotations:
              summary: "Pod is restarting too much"
              description: "Pod {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }} container {{ "{{" }} $labels.container {{ "}}" }} restarted more than 3 times in 10 minutes."

          - alert: KubernetesDeploymentReplicasUnavailable
            expr: kube_deployment_status_replicas_available < kube_deployment_spec_replicas
            for: 5m
            labels:
              severity: warning
              category: kubernetes
            annotations:
              summary: "Deployment has unavailable replicas"
              description: "Deployment {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.deployment {{ "}}" }} does not have all desired replicas available."

          - alert: KubernetesNodeNotReady
            expr: kube_node_status_condition{condition="Ready",status="true"} == 0
            for: 3m
            labels:
              severity: critical
              category: node
            annotations:
              summary: "Kubernetes node is not ready"
              description: "Node {{ "{{" }} $labels.node {{ "}}" }} has been NotReady for more than 3 minutes."

          - alert: PrometheusTargetDown
            expr: up == 0
            for: 2m
            labels:
              severity: warning
              category: monitoring
            annotations:
              summary: "Prometheus target is down"
              description: "Prometheus target {{ "{{" }} $labels.job {{ "}}" }} / {{ "{{" }} $labels.instance {{ "}}" }} has been down for more than 2 minutes."
{{- end }}
