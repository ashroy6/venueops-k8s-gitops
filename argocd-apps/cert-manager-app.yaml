apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default

  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.20.2
    helm:
      releaseName: cert-manager
      values: |
        crds:
          enabled: true
          keep: true

        replicaCount: 2

        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 1
            maxUnavailable: 1

        podDisruptionBudget:
          enabled: true
          minAvailable: 1

        nodeSelector:
          kubernetes.io/os: linux
          node-role.kubernetes.io/worker: worker

        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                app.kubernetes.io/instance: cert-manager
                app.kubernetes.io/component: controller

        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault

        containerSecurityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

        networkPolicy:
          enabled: true

        enableServiceLinks: false

        prometheus:
          enabled: true
          servicemonitor:
            enabled: false
          podmonitor:
            enabled: false

        webhook:
          replicaCount: 2

          strategy:
            type: RollingUpdate
            rollingUpdate:
              maxSurge: 1
              maxUnavailable: 1

          podDisruptionBudget:
            enabled: true
            minAvailable: 1

          nodeSelector:
            kubernetes.io/os: linux
            node-role.kubernetes.io/worker: worker

          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: cert-manager
                  app.kubernetes.io/component: webhook

          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          networkPolicy:
            enabled: true

          enableServiceLinks: false

        cainjector:
          replicaCount: 2

          strategy:
            type: RollingUpdate
            rollingUpdate:
              maxSurge: 1
              maxUnavailable: 1

          podDisruptionBudget:
            enabled: true
            minAvailable: 1

          nodeSelector:
            kubernetes.io/os: linux
            node-role.kubernetes.io/worker: worker

          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: cert-manager
                  app.kubernetes.io/component: cainjector

          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          networkPolicy:
            enabled: true

          enableServiceLinks: false

        startupapicheck:
          enabled: true

          nodeSelector:
            kubernetes.io/os: linux
            node-role.kubernetes.io/worker: worker

          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
