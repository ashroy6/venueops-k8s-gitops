apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: venueops
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ashroy6/venueops-k8s-gitops.git
    targetRevision: main
    path: helm/venueops

  destination:
    server: https://kubernetes.default.svc
    namespace: venueops

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
